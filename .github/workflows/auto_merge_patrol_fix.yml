name: Auto-merge Patrol Fix PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled, unlabeled, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  disable-auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'do-not-merge')
    runs-on: ubuntu-latest
    steps:
      - name: Disable auto-merge when manual review is requested
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --disable-auto || true

  enable-auto-merge:
    if: >
      contains(github.event.pull_request.labels.*.name, 'patrol-auto-fix') &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-merge') &&
      vars.PATROL_AUTO_MERGE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge after required checks pass
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
