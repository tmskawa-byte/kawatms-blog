# ---------------------------------------------------------------------------
# 本文中インラインアフィリエイト カタログ
# ---------------------------------------------------------------------------
# scripts/affiliates.py の select_inline_affiliates() が読み込む。
# 記事の category / tags にマッチした候補から最大 2 件を本文中に自然挿入する。
#
# 運用ルール:
#   - approved: false の間はリンクを出力しない（候補としては選ばれるが、
#     render では出力スキップ）。ケンちゃんが実アフィリンクを url に入れて
#     approved: true にした時点で本番に出る。承認前に偽リンクは公開しない。
#   - url は承認時に実アフィリエイト URL（もしも / 楽天 / Amazon アソシエイト等）
#     に差し替える。今は素の検索 URL をプレースホルダとして置いている。
#
# 制約（絶対遵守。affiliates.py 側でも denylist で二重チェック）:
#   - 保険・金融・投資・FX・暗号資産・自動車保険一括見積もりは NG
#     （共栄火災代理店と競合 / 防犯リスク）
#   - 楽天損保 / 楽天証券 / 楽天カード等の金融系は NG
#   - OK: Amazon カー用品、楽天市場の整備用品、自動車学校、整備士求人
#
# スキーマ:
#   - title:      表示名（リンクテキストの素）
#   - url:        遷移先（承認時に実アフィ URL へ）
#   - categories: マッチ対象カテゴリ（整備の現場 / 越境EC事業 / AI・自動化 / 対馬ライフ）
#   - tags:       マッチ対象タグ（記事 tags との重なりでスコアリング）
#   - affiliate:  プラットフォーム識別子（amazon / rakuten / a8 / moshimo 等）
#   - approved:   true で本番出力。false の間は出力スキップ
# ---------------------------------------------------------------------------

